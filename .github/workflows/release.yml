name: Release

# Cuts a GitHub Release and publishes the module to the Bazel Central Registry.
#
# Uses the canonical bazel-contrib release_ruleset + publish-to-bcr flow so that
# the source archive's provenance attestation lands exactly where publish-to-bcr
# looks for it. Previously release.yml built a bespoke archive, attested it into
# GitHub's attestation store (not as a release asset), published the release
# non-draft, and called publish-to-bcr@v6 (not a real tag) — so the BCR publish
# 404'd fetching <source-url>.intoto.jsonl and never landed.
#
# Flow:
#   release  : release_ruleset builds rules_wasm_component-<tag>.tar.gz via
#              release_prep.sh, attests it, uploads <archive>.tar.gz.intoto.jsonl,
#              and creates the release as a DRAFT.
#   publish  : publish-to-bcr (same run) finds the attestation, opens the BCR PR.
#   finalize : un-drafts the release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.1.0)"
        required: true
        type: string

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7.7.0
    with:
      release_files: rules_wasm_component-*.tar.gz
      prerelease: false
      # Draft so publish-to-bcr can upload source.json/MODULE.bazel attestations
      # to the release before it goes live (required for immutable releases).
      draft: true
      tag_name: ${{ inputs.tag || github.ref_name }}
      # release_ruleset defaults to `bazel test //...`, which fails to LOAD this
      # repo's optional/lazy-dep example packages (e.g. examples/moonbit_component
      # needs @rules_moonbit, deliberately not eagerly fetched). Build the core
      # rule packages only — a pre-release sanity check; the full suite already
      # ran in main CI on the tagged commit.
      bazel_test_command: "bazel build //wasm/... //wit/... //rust/... //go/... //cpp/... //js/... //providers/..."

  publish:
    needs: release
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.4.1
    with:
      tag_name: ${{ inputs.tag || github.ref_name }}
      registry_fork: pulseengine/bazel-central-registry
      attest: true
    permissions:
      id-token: write
      attestations: write
      contents: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}

  finalize:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: false
          make_latest: true
